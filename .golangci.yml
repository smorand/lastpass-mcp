linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gosec
    - prealloc
    - nolintlint
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable:
      - shadow
  revive:
    rules:
      - name: unexported-return
        disabled: true
